<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ENS Network Explorer — resolve .eth names and map their social graph." />
    <title>Japandi ENS · Network Explorer</title>
    <script>
      // Apply theme before React mounts to prevent a flash of the wrong palette.
      (function () {
        try {
          var stored = localStorage.getItem('japandi-ens:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved =
            stored === 'light' || stored === 'dark'
              ? stored
              : prefersDark
              ? 'dark'
              : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
